<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitZone - תודה על פנייתך</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #111827, #1f2937);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
        }

        .card {
            background: white;
            color: #111827;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h1 {
            color: #16a34a;
            margin-bottom: 15px;
        }

        p {
            font-size: 18px;
            line-height: 1.6;
        }

        .check {
            font-size: 60px;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

<div class="card">
    <div class="check">✅</div>

    <h1>תודה רבה!</h1>

    <p>
        פרטיך התקבלו בהצלחה במערכת FitZone.
    </p>

    <p>
        נציג המכירות של הסניף שבחרת יחזור אליך בהקדם
        לצורך השלמת תהליך ההרשמה.
    </p>

    <p>
        מאחלים לך הצלחה בדרך לאורח חיים בריא וספורטיבי 💪
    </p>

</div>

</body>
</html>
